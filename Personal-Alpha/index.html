<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Alpha</title>
    <style>
        :root { --bg: #050505; --card: #111; --accent: #d4af37; --text: #f0f0f0; --dim: #888; --serif: 'Georgia', serif; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: 0 auto; }
        
        /* Goal Tracker */
        .goal-header { border: 1px solid var(--accent); padding: 20px; border-radius: 4px; margin-bottom: 30px; text-align: center; }
        .progress-bg { background: #222; height: 8px; border-radius: 4px; margin: 15px 0; overflow: hidden; }
        .progress-fill { background: var(--accent); height: 100%; width: 0.1%; transition: 2s; }
        .days-left { font-size: 0.8rem; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }

        /* Alpha Modules */
        .alpha-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .alpha-card { background: var(--card); border-left: 3px solid var(--accent); padding: 20px; border-radius: 4px; }
        .alpha-card h3 { font-size: 0.7rem; text-transform: uppercase; color: var(--accent); margin: 0 0 10px 0; }
        .alpha-content { font-size: 0.95rem; line-height: 1.4; }

        /* News Section */
        h1 { font-family: var(--serif); font-size: 2.2rem; margin-bottom: 5px; }
        .theme { font-family: var(--serif); font-style: italic; font-size: 1.3rem; color: var(--dim); margin-bottom: 30px; }
        .headline { display: block; padding: 15px 0; border-bottom: 1px solid #222; text-decoration: none; color: inherit; }
        .hl-title { font-size: 1.1rem; margin-bottom: 5px; }
        .hl-meta { font-size: 0.75rem; color: var(--dim); text-transform: uppercase; }

        @media (max-width: 600px) { .alpha-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container" id="app">
        <header class="goal-header">
            <div class="days-left" id="countdown">Calculating Journey...</div>
            <div class="progress-bg"><div class="progress-fill" id="bar"></div></div>
        </header>

        <div id="content-area">Loading Intelligence...</div>
    </div>

    <script>
        function updateGoal() {
            const start = new Date('2026-03-01');
            const end = new Date('2032-03-01');
            const now = new Date();
            const total = end - start;
            const elapsed = now - start;
            const percent = Math.max(0, (elapsed / total) * 100).toFixed(2);
            const daysRemaining = Math.ceil((end - now) / (1000 * 60 * 60 * 24));
            
            document.getElementById('bar').style.width = percent + '%';
            document.getElementById('countdown').innerText = `${daysRemaining} Days to Mastery (${percent}%)`;
        }

        async function loadBrief() {
            try {
                const res = await fetch(`summary.json?v=${Date.now()}`);
                const data = await res.json();
                const contentRes = await fetch(`content.json?v=${Date.now()}`);
                const news = await contentRes.json();
                let html = `
                    <h1>The Daily Alpha</h1>
                    <p class="theme">${data.global_theme}</p>
                    
                    <div class="alpha-grid">
                        <div class="alpha-card"><h3>Tech Learning Task</h3><div class="alpha-content">${data.learning_task || 'Analyze market trends for 30m.'}</div></div>
                        <div class="alpha-card"><h3>Solopreneur Gap</h3><div class="alpha-content">${data.biz_opportunity || 'Identify a niche in Portugal SaaS.'}</div></div>
                    </div>

                    <h2 style="color:var(--accent); border-bottom:1px solid #222; padding-bottom:10px;">Strategic Insights</h2>
                    <ul>${data.key_points.map(p => `<li style="margin-bottom:10px;">${p}</li>`).join('')}</ul>
                `;
                document.getElementById('content-area').innerHTML = html;
            } catch (e) { 
                document.getElementById('content-area').innerHTML = "Awaiting first automated build...";
            }
        }

        updateGoal();
        loadBrief();
    </script>
</body>
</html>
