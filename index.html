<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Personal Alpha</title>
    <style>
        :root {
            --bg: #000;
            --card: #0d0d0d;
            --accent: #d4af37;
            --text: #f5f5f5;
            --dim: #666;
            --serif: 'Georgia', serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
            margin: 0;
            padding: 10px 12px;
            padding-top: calc(env(safe-area-inset-top) + 10px);
            padding-bottom: calc(env(safe-area-inset-bottom) + 56px);
        }

        .container { max-width: 800px; margin: 0 auto; }

        /* ── Refresh Button ─────────────────────────────── */
        .refresh-btn {
            position: fixed;
            top: calc(env(safe-area-inset-top) + 10px);
            right: 15px;
            background: none;
            border: none;
            color: var(--accent);
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            z-index: 200;
            padding: 6px 0;
        }
        .refresh-btn:active { opacity: 0.6; }

        /* ── Fixed Footer ───────────────────────────────── */
        .goal-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #000;
            border-top: 1px solid var(--accent);
            padding: 8px 16px;
            padding-bottom: calc(env(safe-area-inset-bottom) + 8px);
            z-index: 100;
        }
        .goal-footer-inner {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .days-left {
            font-size: 0.65rem;
            color: var(--accent);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .progress-bg {
            flex: 1;
            background: #1a1a1a;
            height: 4px;
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            background: var(--accent);
            height: 100%;
            width: 0.1%;
            transition: width 2s ease;
        }

        /* ── Header / Title ─────────────────────────────── */
        h1 {
            font-family: var(--serif);
            font-size: 1.8rem;
            margin: 0 0 2px 0;
            line-height: 1.1;
        }
        .theme {
            font-family: var(--serif);
            font-style: italic;
            font-size: 1rem;
            color: var(--dim);
            margin: 0 0 14px 0;
            line-height: 1.4;
        }

        /* ── Signals Strip ──────────────────────────────── */
        .signals {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
        }
        .signal-card {
            background: var(--card);
            border-left: 2px solid var(--accent);
            padding: 8px 10px;
            border-radius: 3px;
        }
        .signal-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent);
            margin-bottom: 3px;
        }
        .signal-value {
            font-size: 0.82rem;
            line-height: 1.3;
            color: var(--text);
        }

        /* ── Alpha Cards ────────────────────────────────── */
        .alpha-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
        }
        .alpha-card {
            background: var(--card);
            border-left: 2px solid var(--accent);
            padding: 10px 12px;
            border-radius: 3px;
        }
        .alpha-card h3 {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent);
            margin: 0 0 6px 0;
        }
        .alpha-content {
            font-size: 0.82rem;
            line-height: 1.4;
            color: var(--text);
        }

        /* ── Strategic Insights ─────────────────────────── */
        .section-title {
            font-family: var(--serif);
            font-size: 0.75rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 3px;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 6px;
            margin: 18px 0 6px 0;
        }

        .insights-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 4px;
        }
        .insight-item {
            background: var(--card);
            padding: 8px 10px;
            border-radius: 3px;
            font-size: 0.8rem;
            line-height: 1.4;
            color: var(--text);
            border-left: 1px solid #2a2a2a;
        }

        /* ── Headlines ──────────────────────────────────── */
        .headline {
            display: block;
            padding: 10px 0;
            border-bottom: 1px solid #111;
            text-decoration: none;
            color: inherit;
            transition: padding-left 0.15s;
        }
        .headline:hover, .headline:active { padding-left: 6px; border-bottom-color: var(--accent); }
        .hl-title { font-size: 0.92rem; margin-bottom: 3px; line-height: 1.35; }
        .hl-meta { font-size: 0.65rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.8px; }

        /* ── Mood Bar ───────────────────────────────────── */
        .mood-strip {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            padding: 7px 10px;
            background: var(--card);
            border-radius: 3px;
            font-size: 0.72rem;
        }
        .mood-label { color: var(--dim); text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0; }
        .mood-value { color: var(--accent); font-weight: 600; }

        @media (max-width: 480px) {
            .insights-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <button class="refresh-btn" onclick="window.location.reload()">&#8635; Refresh</button>

    <div class="container" id="app">
        <div id="content-area">
            <h1>Personal Alpha</h1>
            <p class="theme">Loading intelligence...</p>
        </div>
    </div>

    <footer class="goal-footer">
        <div class="goal-footer-inner">
            <div class="days-left" id="countdown">&#8212;</div>
            <div class="progress-bg"><div class="progress-fill" id="bar"></div></div>
        </div>
    </footer>

    <script>
        function updateGoal() {
            const start = new Date('2026-03-01');
            const end   = new Date('2032-03-01');
            const now   = new Date();
            const total   = end - start;
            const elapsed = now - start;
            const percent = Math.max(0, Math.min(100, (elapsed / total) * 100)).toFixed(1);
            const daysLeft = Math.max(0, Math.ceil((end - now) / 86400000));

            document.getElementById('bar').style.width = percent + '%';
            document.getElementById('countdown').textContent =
                `€35k · ${daysLeft}d · ${percent}%`;
        }

        function fmtDate(str) {
            try {
                return new Date(str).toLocaleDateString('en-GB', {
                    day: 'numeric', month: 'short',
                    hour: '2-digit', minute: '2-digit'
                });
            } catch(e) { return str; }
        }

        async function loadBrief() {
            try {
                const [summaryRes, contentRes] = await Promise.all([
                    fetch(`summary.json?v=${Date.now()}`),
                    fetch(`content.json?v=${Date.now()}`)
                ]);
                const data = await summaryRes.json();
                const news = await contentRes.json();

                // Signals strip
                const signalsHtml = `
                    <div class="signals">
                        <div class="signal-card">
                            <div class="signal-label">Risk Signal</div>
                            <div class="signal-value">${data.risk_signal || '—'}</div>
                        </div>
                        <div class="signal-card">
                            <div class="signal-label">Opportunity</div>
                            <div class="signal-value">${data.opportunity_signal || '—'}</div>
                        </div>
                    </div>`;

                // Mood bar
                const moodHtml = `
                    <div class="mood-strip">
                        <span class="mood-label">Market Mood</span>
                        <span class="mood-value">${data.market_mood || '—'}</span>
                    </div>`;

                // Alpha cards
                const alphaHtml = `
                    <div class="alpha-grid">
                        <div class="alpha-card">
                            <h3>Today's Skill</h3>
                            <div class="alpha-content">${data.learning_task || '—'}</div>
                        </div>
                        <div class="alpha-card">
                            <h3>Biz Gap</h3>
                            <div class="alpha-content">${data.biz_opportunity || '—'}</div>
                        </div>
                    </div>`;

                // Strategic insights — 2-col grid
                const insightsHtml = `
                    <h2 class="section-title">Strategic Insights</h2>
                    <div class="insights-grid">
                        ${data.key_points.map(p => `<div class="insight-item">${p}</div>`).join('')}
                    </div>`;

                // Intelligence feed — all sections
                const feedHtml = `
                    <h2 class="section-title" style="margin-top:22px;">
                        Intelligence Feed &mdash; ${new Date(news.built_at).toLocaleDateString('en-GB', {weekday:'short', day:'numeric', month:'short'})}
                    </h2>
                    ${Object.entries(news.sections).map(([section, articles]) => `
                        <h3 class="section-title" style="font-size:0.65rem; margin-top:16px;">${section}</h3>
                        ${articles.map(a => `
                            <a class="headline" href="${a.url}" target="_blank" rel="noopener noreferrer">
                                <div class="hl-title">${a.title}</div>
                                <div class="hl-meta">${a.source}&nbsp;·&nbsp;${fmtDate(a.published)}</div>
                            </a>`).join('')}
                    `).join('')}`;

                document.getElementById('content-area').innerHTML = `
                    <h1>The Daily Alpha</h1>
                    <p class="theme">${data.global_theme}</p>
                    ${moodHtml}
                    ${signalsHtml}
                    ${alphaHtml}
                    ${insightsHtml}
                    ${feedHtml}
                `;
            } catch(e) {
                document.getElementById('content-area').innerHTML =
                    `<h1>Personal Alpha</h1><p class="theme">Awaiting first automated build...</p>`;
            }
        }

        updateGoal();
        loadBrief();
    </script>
</body>
</html>
