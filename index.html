<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Personal Alpha</title>
    <style>
        :root {
            --bg:     #000;
            --card:   #0d0d0d;
            --accent: #d4af37;
            --text:   #f0f0f0;
            --dim:    #555;
            --pos:    #4caf50;
            --neg:    #f44336;
            --neu:    #333;
            --serif:  'Georgia', serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
            margin: 0;
            padding: 10px 13px;
            padding-top:    calc(env(safe-area-inset-top)    + 10px);
            padding-bottom: calc(env(safe-area-inset-bottom) + 52px);
        }

        .container { max-width: 800px; margin: 0 auto; }

        /* ── Refetch button ─────────────────────────────── */
        .refetch-btn {
            position: fixed;
            top:   calc(env(safe-area-inset-top) + 10px);
            right: 14px;
            background: none;
            border: none;
            color: var(--dim);
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            z-index: 200;
            padding: 6px 0;
            transition: color 0.2s;
        }
        .refetch-btn:hover, .refetch-btn:active { color: var(--accent); }

        /* ── Fixed Goal Footer ──────────────────────────── */
        .goal-footer {
            position: fixed;
            bottom: 0; left: 0;
            width: 100%;
            background: #000;
            border-top: 1px solid #1c1c1c;
            padding: 7px 14px;
            padding-bottom: calc(env(safe-area-inset-bottom) + 7px);
            z-index: 100;
        }
        .goal-footer-inner {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .days-left {
            font-size: 0.62rem;
            color: var(--dim);
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .days-left span { color: var(--accent); }
        .progress-bg {
            flex: 1;
            background: #111;
            height: 3px;
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            background: var(--accent);
            height: 100%;
            width: 0.1%;
            transition: width 2s ease;
        }

        /* ── Page title ─────────────────────────────────── */
        h1 {
            font-family: var(--serif);
            font-size: 1.7rem;
            margin: 0 0 2px 0;
            line-height: 1.1;
        }
        .theme {
            font-family: var(--serif);
            font-style: italic;
            font-size: 0.95rem;
            color: var(--dim);
            margin: 0 0 12px 0;
            line-height: 1.4;
        }

        /* ── Signals strip ──────────────────────────────── */
        .signals {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 7px;
            margin-bottom: 12px;
        }
        .signal-card {
            background: var(--card);
            border-left: 2px solid var(--accent);
            padding: 7px 9px;
            border-radius: 3px;
        }
        .signal-label {
            font-size: 0.58rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent);
            margin-bottom: 3px;
        }
        .signal-value { font-size: 0.8rem; line-height: 1.3; }

        /* ── Mood bar ───────────────────────────────────── */
        .mood-strip {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            padding: 6px 9px;
            background: var(--card);
            border-radius: 3px;
            font-size: 0.7rem;
        }
        .mood-label { color: var(--dim); text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0; }
        .mood-value { color: var(--accent); font-weight: 600; }

        /* ── Alpha cards ────────────────────────────────── */
        .alpha-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 7px;
            margin-bottom: 12px;
        }
        .alpha-card {
            background: var(--card);
            border-left: 2px solid var(--accent);
            padding: 9px 10px;
            border-radius: 3px;
        }
        .alpha-card h3 {
            font-size: 0.58rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent);
            margin: 0 0 5px 0;
        }
        .alpha-content { font-size: 0.8rem; line-height: 1.4; }

        /* ── Section headers + pagination ───────────────── */
        .section-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 5px;
            margin: 18px 0 5px 0;
        }
        .section-title {
            font-family: var(--serif);
            font-size: 0.72rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0;
        }
        .page-btn {
            background: none;
            border: none;
            color: var(--dim);
            font-size: 0.75rem;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
            transition: color 0.15s;
            flex-shrink: 0;
        }
        .page-btn:hover { color: var(--accent); }
        .page-dot {
            font-size: 0.55rem;
            color: var(--dim);
            margin-left: 4px;
            letter-spacing: 2px;
        }
        .page-dot .active { color: var(--accent); }

        /* ── Insights grid ──────────────────────────────── */
        .insights-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            margin-bottom: 4px;
        }
        .insight-item {
            background: var(--card);
            padding: 7px 9px;
            border-radius: 3px;
            font-size: 0.78rem;
            line-height: 1.4;
            border-left: 1px solid #1e1e1e;
        }

        /* ── Headlines ──────────────────────────────────── */
        .headline {
            display: flex;
            align-items: flex-start;
            gap: 7px;
            padding: 9px 0;
            border-bottom: 1px solid #111;
            text-decoration: none;
            color: inherit;
            transition: padding-left 0.15s;
        }
        .headline:hover, .headline:active { padding-left: 5px; }

        /* Portugal priority pool — subtle gold left accent */
        .headline.hl-priority {
            border-left: 2px solid var(--accent);
            padding-left: 8px;
        }
        .headline.hl-priority:hover,
        .headline.hl-priority:active { padding-left: 11px; }

        .hl-body { flex: 1; min-width: 0; }

        /* line-height 1.4 + 2-line clamp prevents layout breaks on long titles */
        .hl-title {
            font-size: 0.9rem;
            margin-bottom: 3px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .hl-meta {
            font-size: 0.62rem;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 0.7px;
        }

        /* ── Sentiment dots ─────────────────────────────── */
        .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 6px;
        }
        .dot-pos { background: var(--pos); }
        .dot-neg { background: var(--neg); }
        .dot-neu { background: var(--neu); }

        @media (max-width: 480px) {
            .insights-grid { grid-template-columns: 1fr; }
            .alpha-grid    { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <button class="refetch-btn" onclick="window.location.reload()">&#x27F3; Refetch</button>

    <div class="container" id="app">
        <div id="content-area">
            <h1>Personal Alpha</h1>
            <p class="theme">Loading intelligence&hellip;</p>
        </div>
    </div>

    <footer class="goal-footer">
        <div class="goal-footer-inner">
            <div class="days-left" id="countdown">&mdash;</div>
            <div class="progress-bg"><div class="progress-fill" id="bar"></div></div>
        </div>
    </footer>

    <script>
    // ── Goal tracker ──────────────────────────────────────────────
    function updateGoal() {
        const start   = new Date('2026-03-01');
        const end     = new Date('2032-05-27');   // 27 May 2032 — 6.2-yr horizon
        const now     = new Date();
        const total   = end - start;              // 2,279 days
        const elapsed = now - start;
        const dayX    = Math.max(1, Math.ceil(elapsed / 86400000));
        const pct     = Math.max(0, Math.min(100, (elapsed / total) * 100)).toFixed(2);

        document.getElementById('bar').style.width = pct + '%';
        document.getElementById('countdown').innerHTML =
            `Day <span>${dayX}</span> of 2,279 &bull; <span>${pct}%</span> Mastery`;
    }

    // ── Helpers ───────────────────────────────────────────────────
    function toStr(v) {
        if (!v) return '&mdash;';
        if (typeof v === 'string') return v;
        return Object.values(v).join(' &middot; ');
    }

    /**
     * Convert an ISO / RFC-2822 date string to a human-readable relative
     * time string (e.g. "3h ago", "2d ago").  Falls back to a short
     * locale date if the string is unparseable or in the future.
     */
    function relTime(str) {
        try {
            const diff = Date.now() - new Date(str).getTime();
            if (isNaN(diff) || diff < 0) throw new Error();
            const s = Math.floor(diff / 1000);
            if (s <    60) return `${s}s ago`;
            const m = Math.floor(s / 60);
            if (m <    60) return `${m}m ago`;
            const h = Math.floor(m / 60);
            if (h <    24) return `${h}h ago`;
            const d = Math.floor(h / 24);
            if (d <     7) return `${d}d ago`;
            return new Date(str).toLocaleDateString('en-GB',
                { day: 'numeric', month: 'short' });
        } catch(e) { return str || ''; }
    }

    function dotClass(s) {
        if (s === '+') return 'dot dot-pos';
        if (s === '-') return 'dot dot-neg';
        return 'dot dot-neu';
    }

    // ── Paginator factory ─────────────────────────────────────────
    const paginators = {};

    function makePaginator(items, pageSize, labelId) {
        let page = 0;
        const pages = [];
        for (let i = 0; i < items.length; i += pageSize)
            pages.push(items.slice(i, i + pageSize));
        if (!pages.length) pages.push([]);

        const total  = pages.length;

        paginators[labelId] = function next() {
            page = (page + 1) % total;
            render();
        };

        function dots() {
            return Array.from({length: total}, (_, i) =>
                `<span class="${i === page ? 'active' : ''}">&bull;</span>`
            ).join('');
        }

        function render() {
            const el = document.getElementById(`pg-${labelId}-body`);
            if (el) el.innerHTML = pages[page].join('');
            const d  = document.getElementById(`pg-${labelId}-dots`);
            if (d)  d.innerHTML  = dots();
        }

        return { total, dots, firstPage: pages[0] || [] };
    }

    // ── Main loader ───────────────────────────────────────────────
    async function loadBrief() {
        try {
            const [sr, cr] = await Promise.all([
                fetch(`summary.json?v=${Date.now()}`),
                fetch(`content.json?v=${Date.now()}`)
            ]);
            const data = await sr.json();
            const news = await cr.json();

            // Sentiment lookup: { 1: '+', 2: '-', ... }
            const sentMap = {};
            (data.finance_sentiment || []).forEach(o => { sentMap[o.i] = o.s; });

            // Mood bar
            const moodHtml = `
                <div class="mood-strip">
                    <span class="mood-label">Mood</span>
                    <span class="mood-value">${data.market_mood || '&mdash;'}</span>
                </div>`;

            // Signals
            const signalsHtml = `
                <div class="signals">
                    <div class="signal-card">
                        <div class="signal-label">Risk</div>
                        <div class="signal-value">${data.risk_signal || '&mdash;'}</div>
                    </div>
                    <div class="signal-card">
                        <div class="signal-label">Opportunity</div>
                        <div class="signal-value">${data.opportunity_signal || '&mdash;'}</div>
                    </div>
                </div>`;

            // Alpha cards
            const alphaHtml = `
                <div class="alpha-grid">
                    <div class="alpha-card">
                        <h3>Today&rsquo;s Skill</h3>
                        <div class="alpha-content">${toStr(data.learning_task)}</div>
                    </div>
                    <div class="alpha-card">
                        <h3>Biz Gap</h3>
                        <div class="alpha-content">${toStr(data.biz_opportunity)}</div>
                    </div>
                </div>`;

            // Strategic Insights — paginated (3 groups of 5)
            const ins       = data.insights || {};
            const insGroups = [ins.g1 || [], ins.g2 || [], ins.g3 || []];
            const insItems  = insGroups.map(g =>
                `<div class="insights-grid">${
                    g.map(p => `<div class="insight-item">${p}</div>`).join('')
                }</div>`
            );
            const insPg = makePaginator(insItems, 1, 'insights');

            const insightsSectionHtml = `
                <div class="section-header">
                    <h2 class="section-title">Strategic Insights</h2>
                    <span>
                        <span class="page-dot" id="pg-insights-dots">${insPg.dots()}</span>
                        <button class="page-btn" onclick="paginators['insights']()">&#8250;</button>
                    </span>
                </div>
                <div id="pg-insights-body">${insPg.firstPage.join('')}</div>`;

            // Intelligence Feed header
            const feedDate = new Date(news.built_at).toLocaleDateString('en-GB',
                { weekday: 'short', day: 'numeric', month: 'short' });

            // Per-section carousels
            const feedSectionsHtml = Object.entries(news.sections).map(([section, articles]) => {
                const isFinance   = section === 'Finance';
                const isPortugal  = section === 'Portugal';

                const rows = articles.map((a, idx) => {
                    // Sentiment dot (Finance only)
                    const dot = isFinance
                        ? `<span class="${dotClass(sentMap[idx + 1])}"></span>` : '';

                    // Gold left-border for PT priority pool articles
                    const priClass = (isPortugal && a.is_priority) ? ' hl-priority' : '';

                    return `
                        <a class="headline${priClass}" href="${a.url}"
                           target="_blank" rel="noopener noreferrer">
                            ${dot}
                            <div class="hl-body">
                                <div class="hl-title">${a.title}</div>
                                <div class="hl-meta">${a.source}&nbsp;&middot;&nbsp;${relTime(a.published)}</div>
                            </div>
                        </a>`;
                });

                const pgId = section.replace(/\W+/g, '_').toLowerCase();
                const pg   = makePaginator(rows, 5, pgId);

                return `
                    <div class="section-header">
                        <h3 class="section-title" style="font-size:0.65rem;">${section}</h3>
                        <span>
                            <span class="page-dot" id="pg-${pgId}-dots">${pg.dots()}</span>
                            <button class="page-btn" onclick="paginators['${pgId}']()">&rsaquo;</button>
                        </span>
                    </div>
                    <div id="pg-${pgId}-body">${pg.firstPage.join('')}</div>`;
            }).join('');

            document.getElementById('content-area').innerHTML = `
                <h1>The Daily Alpha</h1>
                <p class="theme">${data.global_theme}</p>
                ${moodHtml}
                ${signalsHtml}
                ${alphaHtml}
                ${insightsSectionHtml}
                <div class="section-header" style="margin-top:22px;">
                    <h2 class="section-title">Intelligence Feed &mdash; ${feedDate}</h2>
                </div>
                ${feedSectionsHtml}
            `;

        } catch(e) {
            console.error('loadBrief:', e);
            document.getElementById('content-area').innerHTML =
                `<h1>Personal Alpha</h1>
                 <p class="theme">Awaiting first automated build&hellip;</p>`;
        }
    }

    updateGoal();
    loadBrief();
    </script>
</body>
</html>
